<div class="container mx-auto p-4 max-w-2xl py-8">
  @if (loading()) {
    <div class="flex justify-center p-12">
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
  } @else if (vacancy(); as v) {
    <div class="mb-6">
      <a [routerLink]="['/vacancies', v.id]" class="btn btn-ghost btn-sm">
        &larr; Back to Vacancy Details
      </a>
    </div>

    <div class="card bg-base-100 shadow-xl border border-base-200">
      <div class="card-body">
        <h1 class="card-title text-2xl font-bold mb-1">Apply for {{ v.title }}</h1>
        <p class="text-sm text-base-content/70 mb-6">Please fill out the form below to submit your application.</p>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-control w-full">
              <label class="label">
                <span class="label-text font-medium">First Name <span class="text-error">*</span></span>
              </label>
              <input type="text" formControlName="candidateNames" class="input input-bordered w-full" placeholder="John" />
              <form-error-label [control]="form.get('candidateNames')!" />
            </div>

            <div class="form-control w-full">
              <label class="label">
                <span class="label-text font-medium">Last Name <span class="text-error">*</span></span>
              </label>
              <input type="text" formControlName="candidateLastNames" class="input input-bordered w-full" placeholder="Doe" />
              <form-error-label [control]="form.get('candidateLastNames')!" />
            </div>
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text font-medium">Email Address <span class="text-error">*</span></span>
            </label>
            <input type="email" formControlName="candidateEmail" class="input input-bordered w-full" placeholder="john.doe@example.com" />
            <form-error-label [control]="form.get('candidateEmail')!" />
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text font-medium">Phone Number <span class="text-error">*</span></span>
            </label>
            <input type="tel" formControlName="candidatePhoneNumber" class="input input-bordered w-full" placeholder="+1 234 567 8900" />
            <form-error-label [control]="form.get('candidatePhoneNumber')!" />
          </div>

          <div class="form-control w-full">
            <label class="label">
              <span class="label-text font-medium">Curriculum Vitae (PDF) <span class="text-error">*</span></span>
            </label>
            <input type="file" 
                   accept="application/pdf" 
                   class="file-input file-input-bordered w-full" 
                   (change)="onFileChange($event)" />
            <p class="text-xs text-base-content/60 mt-1">Maximum file size: 10MB</p>
            <input type="hidden" formControlName="cvFileName" />
            <form-error-label [control]="form.get('cvFileName')!" />
          </div>

          <div class="card-actions justify-end mt-8 pt-4 border-t border-base-200">
            <button type="submit" class="btn btn-primary w-full md:w-auto" [disabled]="isSubmitting()">
              @if (isSubmitting()) {
                <span class="loading loading-spinner"></span>
                Submitting...
              } @else {
                Submit Application
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  }
</div>
