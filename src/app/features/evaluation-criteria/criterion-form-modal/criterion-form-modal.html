<dialog class="modal modal-open">
  <div class="modal-box max-w-sm">
    <h3 class="font-bold text-lg mb-1">{{ criterion() ? 'Edit Criterion' : 'Add Criterion' }}</h3>
    <p class="text-sm text-base-content/70 mb-6">
      Define an evaluation metric that can be used by supervisors.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div class="form-control w-full">
        <label class="label">
          <span class="label-text font-medium text-base-content/80">Criterion Name <span class="text-error">*</span></span>
        </label>
        <input type="text" formControlName="name" class="input input-bordered w-full" placeholder="e.g. Teamwork" />
        <form-error-label [control]="form.get('name')!" />
      </div>

      <div class="modal-action mt-8">
        <button type="button" class="btn btn-ghost" (click)="closed.emit()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="loading loading-spinner loading-sm"></span>
          }
          {{ criterion() ? 'Save Changes' : 'Add Criterion' }}
        </button>
      </div>
    </form>
  </div>
  <div class="modal-backdrop" (click)="closed.emit()"></div>
</dialog>
