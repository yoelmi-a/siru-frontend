<div class="container mx-auto p-4 py-8">
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-3xl font-bold text-base-content">Evaluation Criteria</h1>
      <p class="text-base-content/70 mt-1">Manage the metrics used for employee evaluations.</p>
    </div>
    <button class="btn btn-primary" (click)="openCreateForm()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 mr-2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
      </svg>
      Add Criterion
    </button>
  </div>

  @if (loading()) {
    <div class="flex justify-center items-center h-64">
      <span class="loading loading-spinner loading-lg text-primary"></span>
    </div>
  } @else {
    <div class="overflow-x-auto bg-base-100 rounded-box shadow-xl border border-base-200">
      <table class="table table-zebra w-full">
        <thead class="bg-base-200">
          <tr>
            <th class="w-20 text-base font-bold">ID</th>
            <th class="text-base font-bold">Name</th>
            <th class="text-base font-bold text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (c of criteria(); track c.id) {
            <tr class="hover">
              <td class="font-mono text-xs opacity-60">{{ c.id }}</td>
              <td>
                <div class="font-medium">{{ c.name }}</div>
              </td>
              <td class="text-right">
                <div class="flex justify-end gap-1">
                  <button class="btn btn-xs btn-ghost text-warning" (click)="openEditForm(c)" title="Edit">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
                    </svg>
                  </button>
                  <button class="btn btn-xs btn-ghost text-error" (click)="confirmDelete.set(c)" title="Delete">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                    </svg>
                  </button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3" class="text-center p-12 text-base-content/60">
                <div class="flex flex-col items-center gap-2">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 opacity-20">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0017.25 4.5H6.75A2.25 2.25 0 004.5 6.75v10.5A2.25 2.25 0 006.75 19.5h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" />
                  </svg>
                  <span>No evaluation criteria found. Add one to get started.</span>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>

@if (showForm()) {
  <app-criterion-form-modal
    [criterion]="editingCriterion()"
    (saved)="onFormSaved()"
    (closed)="showForm.set(false)"
  />
}

@if (confirmDelete(); as c) {
  <app-confirm-dialog
    title="Delete Criterion"
    [message]="'Are you sure you want to delete \'' + c.name + '\'? This action cannot be undone if the criterion is already in use.'"
    confirmText="Delete"
    (confirm)="onDeleteConfirm()"
    (cancel)="confirmDelete.set(null)"
  />
}
