<div class="flex justify-between items-center mb-4">
  <h2 class="text-2xl font-bold">Departments</h2>
  <button class="btn btn-primary" (click)="openCreateForm()">
    Create Department
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center p-8">
    <span class="loading loading-spinner loading-lg"></span>
  </div>
} @else {
  <div class="overflow-x-auto">
    <table class="table table-zebra">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (department of departments(); track department.id) {
          <tr>
            <td>{{ department.id }}</td>
            <td>{{ department.name }}</td>
            <td class="flex gap-2">
              <button class="btn btn-sm btn-primary" (click)="openEditForm(department)">Edit</button>
              <button class="btn btn-sm btn-error" (click)="confirmDeleteDepartment(department)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="text-center p-4">No departments found</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}

@if (showForm()) {
  <app-department-form
    [department]="editingDepartment()"
    (saved)="onFormSaved()"
    (cancelled)="closeForm()"
  />
}

@if (confirmDelete()) {
  <app-confirm-dialog
    title="Delete Department"
    message="Are you sure you want to delete this department? This action cannot be undone."
    confirmText="Delete"
    (confirmed)="deleteDepartment()"
    (cancelled)="cancelDelete()"
  />
}
