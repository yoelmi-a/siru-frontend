<dialog class="modal modal-open">
  <div class="modal-box">
    <h3 class="font-bold text-lg">
      {{ position() ? 'Edit Position' : 'Create Position' }}
    </h3>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="py-4">
      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">Name</span>
        </label>
        <input
          type="text"
          formControlName="name"
          class="input input-bordered"
          placeholder="Position name" />
        <form-error-label [control]="form.get('name')!" />
      </div>

      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">Salary</span>
        </label>
        <input
          type="number"
          formControlName="salary"
          class="input input-bordered"
          placeholder="Salary" />
        <form-error-label [control]="form.get('salary')!" />
      </div>

      <div class="form-control mb-4">
        <label class="label">
          <span class="label-text">Department</span>
        </label>
        <select formControlName="departmentId" class="select select-bordered">
          <option value="">Select department</option>
          @for (dept of departments(); track dept.id) {
            <option [value]="dept.id">{{ dept.name }}</option>
          }
        </select>
        <form-error-label [control]="form.get('departmentId')!" />
      </div>

      <div class="modal-action">
        <button type="button" class="btn" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-primary" [disabled]="isPosting()">
          @if (isPosting()) {
            <span class="loading loading-spinner"></span>
          } @else {
            {{ position() ? 'Update' : 'Create' }}
          }
        </button>
      </div>
    </form>
  </div>
  <div class="modal-backdrop" (click)="onCancel()"></div>
</dialog>
