<div class="flex justify-between items-center mb-4">
  <h2 class="text-2xl font-bold">Positions</h2>
  <button class="btn btn-primary" (click)="openCreateForm()">
    Create Position
  </button>
</div>

@if (loading()) {
  <div class="flex justify-center p-8">
    <span class="loading loading-spinner loading-lg"></span>
  </div>
} @else {
  <div class="overflow-x-auto">
    <table class="table table-zebra">
      <thead>
        <tr>
          <th>Name</th>
          <th>Salary</th>
          <th>Department</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (position of positions(); track position.id) {
          <tr>
            <td>{{ position.name }}</td>
            <td>{{ position.salary | currency }}</td>
            <td>{{ position.departmentName }}</td>
            <td class="flex gap-2">
              <button class="btn btn-sm btn-primary" (click)="openEditForm(position)">Edit</button>
              <button class="btn btn-sm btn-error" (click)="confirmDeletePosition(position)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4" class="text-center p-4">No positions found</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}

@if (showForm()) {
  <app-position-form
    [position]="editingPosition()"
    (saved)="onFormSaved()"
    (cancelled)="closeForm()"
  />
}

@if (confirmDelete()) {
  <app-confirm-dialog
    title="Delete Position"
    message="Are you sure you want to delete this position? This action cannot be undone."
    confirmText="Delete"
    (confirmed)="deletePosition()"
    (cancelled)="cancelDelete()"
  />
}
