<dialog #modal class="modal">
  <div class="modal-box w-11/12 max-w-2xl bg-base-100">
    <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" (click)="closeModal()">✕</button>
    <h3 class="font-bold text-lg mb-4">{{ isEdit() ? 'Editar Empleado' : 'Registrar Nuevo Empleado' }}</h3>
    
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Nombres -->
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Nombres <span class="text-error">*</span></span></div>
          <input type="text" formControlName="name" class="input flex items-center gap-2 w-full bg-base-200 border border-base-300 rounded-lg"
                 [class.input-error]="form.get('name')?.invalid && (form.get('name')?.dirty || form.get('name')?.touched)" />
        </label>

        <!-- Apellidos -->
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Apellidos <span class="text-error">*</span></span></div>
          <input type="text" formControlName="lastName" class="input flex items-center gap-2 w-full bg-base-200 border border-base-300 rounded-lg"
                 [class.input-error]="form.get('lastName')?.invalid && (form.get('lastName')?.dirty || form.get('lastName')?.touched)" />
        </label>

        <!-- Email -->
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Email <span class="text-error">*</span></span></div>
          <input type="email" formControlName="email" class="input flex items-center gap-2 w-full bg-base-200 border border-base-300 rounded-lg"
                 [class.input-error]="form.get('email')?.invalid && (form.get('email')?.dirty || form.get('email')?.touched)" />
        </label>

        <!-- Teléfono -->
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Teléfono <span class="text-error">*</span></span></div>
          <input type="tel" formControlName="phoneNumber" placeholder="ej: 809-555-5555" class="input flex items-center gap-2 w-full bg-base-200 border border-base-300 rounded-lg"
                 [class.input-error]="form.get('phoneNumber')?.invalid && (form.get('phoneNumber')?.dirty || form.get('phoneNumber')?.touched)" />
        </label>
        
        <!-- Detalles de Posición - Sólo en Creación -->
        @if (!isEdit()) {
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Departamento (ID)</span></div>
            <input type="text" formControlName="departmentId" class="input flex items-center gap-2 w-full bg-base-200 border border-base-300 rounded-lg" />
          </label>
          <label class="form-control w-full">
            <div class="label"><span class="label-text">Posición (ID/Nombre)</span></div>
            <input type="text" formControlName="positionId" class="input flex items-center gap-2 w-full bg-base-200 border border-base-300 rounded-lg" />
          </label>
        }
      </div>

      @if (errorMessage()) {
        <div class="alert alert-error mt-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <div class="modal-action">
        <button type="button" class="btn" (click)="closeModal()">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isSubmitting()">
          @if (isSubmitting()) {
            <span class="loading loading-spinner text-primary"></span> Guardando...
          } @else {
            Guardar
          }
        </button>
      </div>
    </form>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button (click)="closeModal()">close</button>
  </form>
</dialog>
