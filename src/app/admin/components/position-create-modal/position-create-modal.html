<dialog #dialog class="modal">
  <div class="modal-box w-11/12 max-w-2xl">
    <div class="mb-4">
      <h3 class="font-bold text-lg">{{ isEdit() ? 'Editar puesto' : 'Nuevo puesto' }}</h3>
      <p class="text-sm text-base-content/60 mt-1">
        {{ isEdit() ? 'Actualiza la informacion del puesto.' : 'Completa la informacion para registrar un nuevo puesto.' }}
      </p>
    </div>

    @if (errorMessage()) {
    <div role="alert" class="alert alert-error mb-4">
      <span>{{ errorMessage() }}</span>
    </div>
    }

    <form [formGroup]="positionForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <section>
        <label class="label pb-1 text-sm font-semibold" for="name">Nombre<span class="text-error">*</span></label>
        <input id="name" type="text" class="input input-bordered w-full" formControlName="name" placeholder="Ej: Desarrollador Backend" />
        <form-error-label [control]="positionForm.get('name')!" />
      </section>

      <section>
        <label class="label pb-1 text-sm font-semibold" for="salary">Salario<span class="text-error">*</span></label>
        <input id="salary" type="number" class="input input-bordered w-full" formControlName="salary" placeholder="Ej: 50000" />
        <form-error-label [control]="positionForm.get('salary')!" />
      </section>

      <section>
        <label class="label pb-1 text-sm font-semibold" for="departmentId">ID Departamento<span class="text-error">*</span></label>
        <input id="departmentId" type="number" class="input input-bordered w-full" formControlName="departmentId" placeholder="Ej: 1" />
        <form-error-label [control]="positionForm.get('departmentId')!" />
      </section>

      <div class="modal-action mt-6">
        <app-button variant="ghost" (pressed)="onCancel()">Cancelar</app-button>
        <app-button type="submit" variant="primary" [loading]="isPosting()">
          {{ isEdit() ? 'Actualizar puesto' : 'Guardar puesto' }}
        </app-button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" (click)="onCancel()"></div>
</dialog>
