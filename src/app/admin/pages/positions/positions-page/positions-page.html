<div class="min-h-screen bg-base-200 p-4 md:p-8 w-full">
  <app-position-create-modal #createPositionModal (created)="onCreated()"></app-position-create-modal>

  <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-3xl font-bold text-base-content tracking-tight">Puestos</h1>
      <p class="text-base-content/60 mt-1 text-sm">Gestiona los puestos disponibles en el sistema</p>
    </div>
    <button class="btn btn-primary gap-2 shadow-lg w-full sm:w-auto" (click)="onOpenCreateModal()">Crear puesto</button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
    <div class="card bg-base-100 shadow-sm border border-base-300/70">
      <div class="card-body py-4 px-5">
        <p class="text-xs uppercase tracking-wider text-base-content/60 font-semibold">Total puestos</p>
        <p class="text-2xl font-bold text-base-content">{{ positionsList().length }}</p>
      </div>
    </div>
  </div>

  @if (positionsResource.isLoading()) {
  <div class="flex justify-center items-center py-12">
    <span class="loading loading-spinner loading-lg"></span>
  </div>
  }

  <app-admin-vacants-card
    [positions]="positionCards()"
    [detailRoute]="'/admin/positions'"
    [class.hidden]="!(positionsResource.hasValue() && positionsList().length > 0)"
  ></app-admin-vacants-card>

  @if (positionsResource.hasValue() && positionsList().length === 0) {
  <div class="card bg-base-100 shadow-sm">
    <div class="card-body text-center py-12">
      <h2 class="text-lg font-semibold text-base-content">No hay puestos disponibles</h2>
      <p class="text-base-content/60 mt-1">Aun no existen registros para mostrar en esta seccion.</p>
    </div>
  </div>
  }
</div>
