<dialog #dialog class="modal">
  <div class="modal-box max-w-sm">
    <div class="flex flex-col items-center text-center gap-3 py-2">
      <div class="rounded-full bg-warning/50 p-4">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-base-content/70" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <div>
        <h3 class="font-bold text-lg">{{ title() }}</h3>
        <p class="text-sm text-base-content/60 mt-1">
          {{ message() }}
        </p>
      </div>
    </div>

    <div class="modal-action mt-4">
      <div class="flex gap-2 w-full">
        <!-- Sin form method="dialog", manejamos todo desde el componente -->
        <button class="btn btn-ghost flex-1" (click)="onCancel()">Cancelar</button>
        <button class="btn btn-error flex-1"  (click)="onConfirm()">Sí, {{ isDeleted() ? 'Activar' : 'Desactivar' }}</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" (click)="onCancel()"></div>
</dialog>
