<div
  class="card h-screen md:h-auto bg-transparent md:bg-base-100 w-full md:max-w-sm rounded-none md:rounded-box shadow-none md:shadow-2xl mx-auto">
  <div class="card-body justify-center">
    <h2 class="text-3xl md:text-2xl font-bold text-center">¡Tu contraseña fue restablecida exitósamente!</h2>
    <div class="self-center pt-6">
      <svg class="w-auto h-40 md:h-24 animate-bounce" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
        viewBox="0 0 24 24">
        <path class="fill-success"
          d="m10.562 14.492l-2.496-2.496q-.141-.14-.345-.15t-.363.15t-.16.354t.16.354l2.638 2.638q.242.243.565.243t.566-.243l5.477-5.476q.14-.141.15-.345t-.15-.363t-.354-.16t-.354.16zM12.003 21q-1.866 0-3.51-.708q-1.643-.709-2.859-1.924t-1.925-2.856T3 12.003t.709-3.51Q4.417 6.85 5.63 5.634t2.857-1.925T11.997 3t3.51.709q1.643.708 2.859 1.922t1.925 2.857t.709 3.509t-.708 3.51t-1.924 2.859t-2.856 1.925t-3.509.709" />
      </svg>
    </div>
    <section class="pb-4">
      <p class="text-lg md:text-sm font-normal text-base-content/55 text-left">Tu contraseña fue restablecida, ya puedes iniciar sesión con tu nueva contraseña.</p>
    </section>
    <a routerLink="/auth/login" class="btn btn-secondary btn-lg md:btn-md">
      Iniciar Sesión
    </a>
    <section class="self-center pt-2">
      <p class="text-lg md:text-sm text-base-content/55">
        Volviendo al inicio aútomaticamente en
        <span class="countdown text-accent font-semibold">
          <span [style]="'--value:' + countdown()" aria-live="polite" [aria-label]="countdown()"> {{ countdown()
            }}</span>
        </span>
      </p>
    </section>
  </div>
</div>
